<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <h1 class="text-2xl font-bold flex justify-center">Counter State</h1>

    <div class="flex justify-center items-center gap-10 mt-5">

        <button id="decrement" class="text-2xl px-12 py-2 bg-gray-400 rounded-full text-white hover:bg-gray-500 font-bold">-</button>

        <label id="count">0</label>

        <button id="increment" class="text-2xl px-12 py-2 bg-blue-400 rounded-full text-white hover:bg-blue-500 font-bold">+</button>

    </div>
    
    <div class="flex justify-center items-center gap-10 mt-10">

        <div class="block p-6">
            <div id="history" class="grid grid-cols-5 gap-2">History Counter: 
                <!-- ... -->
            </div>

            <button id="undo" class="text-xl px-12 py-2 bg-gray-400 rounded-full text-white hover:bg-gray-500 font-bold mt-6">Undo</button>
        </div>
        
    </div>

    <script src="main.js"></script>
</body>
</html>
