<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body>
    <h1 class="flex justify-center text-center text-2xl font-bold">Live Character Counter & Text Analyzer</h1>

    <div class="flex justify-center items-center mt-10">
        <div class="block">
            <!-- warning -->
            <div id="notification" class="hidden px-8 py-4 bg-yellow-200 rounded-lg text-yellow-800">Gak boleh pake kata Kasar!</div>

            <textarea name="" id="inputElement" class="bg-gray-200 border-none focus:border focus:border-blue-500 focus:ring-2 focus:ring-blue-500 outline-none px-2 py-1 font-normal rounded-xl text-lg w-lg mb-2 mt-2"></textarea>
            
            <div class="">
                <p id="countersCharElement">Counters Character: </p>
                <p id="countersWordElement">Counters Word: </p>
                <p id="countersSentencesElement">Counters Sentences: </p>
            </div>

            <div class="flex justify-center items-center gap-4 mt-4">
                <button id="uppercaseElement" class="px-8 py-4 bg-green-500 rounded-xl text-white font-medium hover:bg-green-400">Change to uppercase</button>

                <button id="lowercaseElement" class="px-8 py-4 bg-teal-500 rounded-xl text-white font-medium hover:bg-teal-400">Change to lowercase</button>
            </div>
        </div>
    </div>


    <script src="main.js"></script>
</body>
</html>
